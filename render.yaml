# OPTIONAL convenience. You do NOT need this — just create a free Web Service in
# the Render dashboard (New > Web Service, Root Directory = backend, Docker, Free).
# Blueprints may require a paid workspace; the manual free Web Service does not.
# The database is Neon (free + permanent) — paste its URL as DATABASE_URL.
services:
  - type: web
    name: aiu-backend
    runtime: docker
    rootDir: backend          # builds backend/Dockerfile (slim, no PyTorch)
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
      - key: EMBEDDING_BACKEND
        value: hf             # embeddings via HuggingFace API (no torch)
      - key: DATABASE_URL
        sync: false           # ← paste your Neon URL (app coerces it to asyncpg)
      - key: GROQ_API_KEY
        sync: false           # ← paste in the Render dashboard
      - key: HF_API_TOKEN
        sync: false           # ← free token from huggingface.co/settings/tokens
      - key: STRIPE_SECRET_KEY
        sync: false           # ← your sk_test_ key (optional, for payments)
      - key: FRONTEND_BASE_URL
        sync: false           # ← set to your Vercel URL afterwards
      - key: CORS_ORIGINS
        sync: false           # ← your Vercel URL(s), comma-separated
